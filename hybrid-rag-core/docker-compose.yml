# Optional — for local development with self-hosted services.
# The app works without Docker (uses Pinecone cloud + Groq API).
# Use this if you want fully local/offline setup.

services:
  # Local vector DB (alternative to Pinecone)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_data:/qdrant/storage

  # Local LLM + embeddings (alternative to Groq + TF-IDF)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # After starting: docker exec ollama ollama pull nomic-embed-text
    # For chat LLM:   docker exec ollama ollama pull llama3.2

volumes:
  ollama_data:
  # qdrant_data:
